sourceRoot: .
lcovPaths:
  - coverage/lcov.info
  - modules/**/coverage/lcov.info
  - packages/**/coverage/lcov.info
outputDir: build/coverage_lens
summaryIcon: assets/app_icon.png
projectName: Example App
thresholds:
  line: 80
  branch: 70
include:
  - lib/**
  - modules/*/lib/**
exclude:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "**/*.config.dart"
  - "**/generated/**"
